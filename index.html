<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnuva Skor Tahmin Uygulaması</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

  <style>
    /* =========================================================
       GLOBAL DEĞİŞKENLER VE AYARLAR
       ========================================================= */
    :root {
      --bg: #111827; 
      --card: #1f2937; 
      --border: #374151;
      --text: #f3f4f6; 
      --muted: #9ca3af; 
      --accent: #3b82f6;
      --green: #22c55e; 
      --yellow: #eab308; 
      --red: #ef4444;
    }

    * {
      box-sizing: border-box; 
      margin: 0; 
      padding: 0;
    }

    body {
      background: var(--bg); 
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding-bottom: 80px; /* Alt tab barın içeriği kapatmaması için ayarlandı */
    }

    .container {
      max-width: 900px; 
      margin: 0 auto; 
      padding: 10px;
    }

    header {
      background: var(--card); 
      padding: 14px 16px; 
      text-align: center;
      border-bottom: 1px solid var(--border); 
      position: sticky; 
      top: 0; 
      z-index: 50;
    }

    header h1 {
      font-size: 1.2rem; 
      letter-spacing: 1px;
    }

    /* =========================================================
       KULLANICI BİLGİ BARI (USER BAR)
       ========================================================= */
    .user-bar {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      background: var(--card); 
      border: 1px solid var(--border);
      border-radius: 10px; 
      padding: 10px 14px; 
      margin: 10px 0; 
      font-size: 0.9rem;
    }

    .user-bar button {
      background: var(--red); 
      color: #fff; 
      border: none; 
      padding: 6px 12px;
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 0.8rem;
    }

    /* =========================================================
       ALT GEÇİŞ SEKMELERİ (TABS BAR)
       ========================================================= */
    .tabs {
      display: flex; 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0;
      background: var(--card); 
      border-top: 1px solid var(--border);
      z-index: 100; 
      overflow-x: auto;
    }

    .tab-btn {
      flex: 1; 
      min-width: 70px; 
      background: none; 
      border: none; 
      color: var(--muted);
      padding: 12px 4px; 
      font-size: 0.75rem; 
      cursor: pointer; 
      text-align: center;
      border-top: 3px solid transparent; 
      transition: .2s;
    }

    .tab-btn.active {
      color: var(--accent); 
      border-top-color: var(--accent);
    }

    .tab-content {
      display: none; 
      animation: fade .3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(6px); } 
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================================
       GENEL FORM VE KART BİLEŞENLERİ
       ========================================================= */
    .card {
      background: var(--card); 
      border: 1px solid var(--border); 
      border-radius: 12px;
      padding: 14px; 
      margin-bottom: 14px;
    }

    h2.section-title {
      font-size: 1.1rem; 
      margin-bottom: 10px; 
      color: var(--accent);
    }

    input, button, select {
      font-family: inherit; 
      border-radius: 6px; 
      border: 1px solid var(--border);
      background: #0f1623; 
      color: var(--text); 
      padding: 8px; 
      font-size: 0.9rem;
    }

    button { 
      cursor: pointer; 
      transition: .2s; 
    }

    button:hover { 
      opacity: .85; 
    }

    .btn-primary { 
      background: var(--accent); 
      color: #fff; 
      border: none; 
      font-weight: 600; 
    }

    .btn-danger { 
      background: var(--red); 
      color: #fff; 
      border: none; 
    }

    .btn-small { 
      padding: 5px 10px; 
      font-size: 0.8rem; 
    }

    /* =========================================================
       GİRİŞ VE KAYIT EKRANI (AUTH PANEL)
       ========================================================= */
    #login-screen {
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 90vh; 
      padding: 20px;
    }

    .login-box {
      background: var(--card); 
      border: 1px solid var(--border); 
      border-radius: 14px;
      padding: 24px; 
      width: 100%; 
      max-width: 340px; 
      text-align: center;
    }

    .login-box h2 { 
      margin-bottom: 14px; 
    }

    .login-box input { 
      width: 100%; 
      margin-bottom: 10px; 
    }

    .login-box button { 
      width: 100%; 
      margin-top: 6px; 
      padding: 10px; 
    }

    .toggle-link { 
      color: var(--accent); 
      cursor: pointer; 
      font-size: 0.85rem; 
      margin-top: 10px; 
      display: block; 
    }

    .error-msg { 
      color: var(--red); 
      font-size: 0.85rem; 
      min-height: 18px; 
      margin-top: 6px; 
    }

    /* =========================================================
       SIRALAMA VE GRUP TABLOLARI
       ========================================================= */
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 0.85rem; 
    }

    th, td { 
      padding: 8px 6px; 
      text-align: center; 
      border-bottom: 1px solid var(--border); 
    }

    th { 
      color: var(--muted); 
      font-weight: 600; 
      font-size: 0.75rem; 
      text-transform: uppercase; 
    }

    td.player-cell { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      text-align: left; 
      min-width: 120px; 
    }

    .avatar {
      width: 28px; 
      height: 28px; 
      border-radius: 50%; 
      display: flex;
      align-items: center; 
      justify-content: center; 
      font-weight: 700; 
      font-size: 0.8rem;
      color: #fff; 
      flex-shrink: 0;
    }

    .points { 
      color: var(--green); 
      font-weight: 700; 
    }

    .legend { 
      font-size: 0.7rem; 
      color: var(--muted); 
      margin-top: 8px; 
      line-height: 1.5; 
    }

    .rank-num { 
      font-weight: 700; 
    }

    .group-block { 
      margin-bottom: 18px; 
    }

    .group-block h3 { 
      margin-bottom: 8px; 
      color: var(--accent); 
      font-size: 1rem; 
    }

    .group-table th, .group-table td { 
      padding: 6px 4px; 
      font-size: 0.8rem; 
    }

    .group-table td:first-child, .group-table th:first-child { 
      text-align: left; 
    }

    /* =========================================================
       MAÇ KARTLARI VE TAHMİN ROZETLERİ (BADGES)
       ========================================================= */
    .match-date-group { 
      margin-bottom: 18px; 
    }

    .match-date-group h3 {
      color: var(--muted); 
      font-size: 0.85rem; 
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border); 
      padding-bottom: 4px;
    }

    .match-card {
      background: #161f30; 
      border: 1px solid var(--border); 
      border-radius: 10px;
      padding: 12px; 
      margin-bottom: 10px;
    }

    .match-top {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      font-size: 0.75rem; 
      color: var(--muted); 
      margin-bottom: 8px;
    }

    .match-teams {
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px;
      font-size: 1rem; 
      font-weight: 600; 
      margin-bottom: 10px;
    }

    .match-teams .vs { 
      color: var(--muted); 
      font-size: 0.8rem; 
    }

    .score-inputs { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px; 
    }

    .score-inputs input { 
      width: 50px; 
      text-align: center; 
      font-size: 1.1rem; 
    }

    .match-actions { 
      display: flex; 
      justify-content: center; 
      margin-top: 10px; 
    }

    .result-box { 
      text-align: center; 
      font-size: 0.9rem; 
      margin-top: 6px; 
    }

    .result-score {
      font-size: 1.4rem; 
      font-weight: 800; 
      color: var(--accent);
    }

    .user-point-badge {
      display: inline-block; 
      margin-top: 6px; 
      padding: 4px 10px; 
      border-radius: 6px;
      font-weight: 700; 
      font-size: 0.8rem;
    }

    /* Rozet Renk Tanımlamaları */
    .badge-2 { background: rgba(34,197,94,.2); color: var(--green); border: 1px solid var(--green); }
    .badge-1 { background: rgba(234,179,8,.2); color: var(--yellow); border: 1px solid var(--yellow); }
    .badge-0 { background: rgba(239,68,68,.2); color: var(--red); border: 1px solid var(--red); }

    .others-predictions {
      margin-top: 10px; 
      padding-top: 8px; 
      border-top: 1px dashed var(--border);
      font-size: 0.78rem; 
      color: var(--muted);
    }

    .others-predictions span.pred-item {
      display: inline-block; 
      background: #0f1623; 
      border-radius: 5px;
      padding: 2px 6px; 
      margin: 2px; 
      color: var(--text);
    }

    /* =========================================================
       ADMIN PANELİ BİLEŞENLERİ
       ========================================================= */
    .admin-match-row {
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      flex-wrap: wrap; 
      gap: 8px; 
      padding: 8px; 
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .admin-match-row .teams { 
      flex: 1; 
      min-width: 150px; 
    }

    .admin-score-inputs { 
      display: flex; 
      gap: 6px; 
      align-items: center; 
    }

    .admin-score-inputs input { 
      width: 45px; 
      text-align: center; 
    }

    .admin-user-row {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 8px; 
      border-bottom: 1px solid var(--border); 
      font-size: 0.85rem;
    }

    .hidden { 
      display: none !important; 
    }
  </style>
</head>

  <div id="login-screen">

      <h2>⚽ Turnuva Tahmin</h2>
      
      <div id="login-form">
        <input type="text" id="login-name" placeholder="Kullanıcı Adı">
        <input type="password" id="login-pass" placeholder="Şifre">
        <button class="btn-primary" onclick="playerLogin()">Giriş Yap</button>
        <span class="toggle-link" onclick="toggleAuthForm()">Hesabın yok mu? Kayıt Ol</span>
      </div>
      
      <div id="register-form" class="hidden">
        <input type="text" id="reg-name" placeholder="Kullanıcı Adı">
        <input type="password" id="reg-pass" placeholder="Şifre">
        <button class="btn-primary" onclick="registerPlayer()">Kayıt Ol</button>
        <span class="toggle-link" onclick="toggleAuthForm()">Hesabın var mı? Giriş Yap</span>
      </div>
      
      <div class="error-msg" id="auth-error"></div>
    </div>
  </div>

    <header>
      <h1>🏆 TURNUVA SKOR TAHMİN</h1>
    </header>

        <span>👤 Hoş geldin, <strong id="current-user-name"></strong></span>
        <button onclick="logout()">Çıkış</button>
      </div>

        <div class="card">
          <h2 class="section-title">📊 Genel Sıralama</h2>
          <div style="overflow-x:auto;">
            <table id="leaderboard-table">
              <thead>
                <tr>

                  <th style="text-align:left;">Oyuncu</th>
                  <th>P</th>
                  <th>O</th>
                  <th>TS</th>
                  <th>K/B</th>

                  <th>AV</th>

          </div>
          <div class="legend">

        </div>
      </div>

      <div id="tab-gruplar" class="tab-content">
        <div id="groups-container"></div>
      </div>

      <div id="tab-maclar" class="tab-content">
        <div id="matches-container"></div>
      </div>

      <div id="tab-sonuclar" class="tab-content">
        <div id="results-container"></div>
      </div>

      <div id="tab-admin" class="tab-content">
        <div class="card">
          <h2 class="section-title">⚙️ Maç Sonuçları Yönetimi</h2>
          <div id="admin-matches-container"></div>
        </div>
        <div class="card">
          <h2 class="section-title">👥 Kullanıcı Yönetimi</h2>
          <div id="admin-users-container"></div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="siralama" onclick="switchTab('siralama')">📊 Sıralama</button>
      <button class="tab-btn" data-tab="gruplar" onclick="switchTab('gruplar')">🗂️ Gruplar</button>
      <button class="tab-btn" data-tab="maclar" onclick="switchTab('maclar')">⚽ Maçlar</button>
      <button class="tab-btn" data-tab="sonuclar" onclick="switchTab('sonuclar')">🏁 Sonuçlar</button>
      <button class="tab-btn hidden" id="admin-tab-btn" data-tab="admin" onclick="switchTab('admin')">🛠️ Admin</button>
    </div>
  </div>

/* =========================================================
   3. UYGULAMA DURUM DEĞİŞKENLERİ (STATE)
   ========================================================= */
let CURRENT_UID = null;
let CURRENT_NAME = null;
let IS_ADMIN = false;

let USERS = {};
let PREDICTIONS = {};
let RESULTS = {};

/* =========================================================
   4. YARDIMCI FONKSİYONLAR (UTILITIES)
   ========================================================= */
function generateUID() {
  return 'u_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

function getInitialColor(name) {
  const colors = ['#3b82f6', '#ef4444', '#22c55e', '#eab308', '#a855f7', '#06b6d4', '#f97316', '#ec4899'];
  let sum = 0;
  for (let i = 0; i < name.length; i++) { sum += name.charCodeAt(i); }
  return colors[sum % colors.length];
}

function flag(team) {
  // Eğer id tanımlamaları (W74 vb.) varsa bayrak basmasın
  if(team.includes('W') || team.includes('RU')) return "🏆";
  return TEAM_FLAGS[team] || "🏳️";
}

function isAdminName(name) {
  return (name || '').trim().toLowerCase() === 'admin';
}

// 4 PUANLIK GELİŞTİRİLMİŞ PUAN HESAPLAMA ALGORİTMASI
function evaluatePrediction(pred, result) {
  if (!pred || !result) return null;
  
  const ph = parseInt(pred.hScore), pa = parseInt(pred.aScore);
  const rh = parseInt(result.hScore), ra = parseInt(result.aScore);
  
  if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return null;

  let totalPoints = 0;
  let breakdown = [];

  // --- 1. AŞAMA: 120 DAKİKA SKOR DEĞERLENDİRMESİ (Maks 2 Puan) ---
  if (ph === rh && pa === ra) {
    totalPoints += 2;
    breakdown.push('TS (120 Dk Tam Skor: +2)');
  } else {
    const predDiff = Math.sign(ph - pa);
    const realDiff = Math.sign(rh - ra);
    if (predDiff === realDiff) {
      totalPoints += 1;
      breakdown.push('KB (120 Dk Taraf/Beraberlik: +1)');
    }
  }

  // --- 2. AŞAMA: PENALTI DEĞERLENDİRMESİ (Maks 2 Puan) ---
  // Eğer maç gerçekte penaltılara gitmişse (120 dk skoru beraberse) ve admin penaltı girmişse
  if (rh === ra && result.penWinner && result.penHScore !== undefined && result.penAScore !== undefined) {
    const rPenW = result.penWinner;
    const rPenH = parseInt(result.penHScore);
    const rPenA = parseInt(result.penAScore);

    const pPenW = pred.penWinner;
    const pPenH = parseInt(pred.penHScore);
    const pPenA = parseInt(pred.penAScore);

    if (pPenW && !isNaN(pPenH) && !isNaN(pPenA)) {
      // Penaltı kazanan tarafını bildi mi? (+1 Puan)
      if (pPenW === rPenW) {
        totalPoints += 1;
        breakdown.push('PK (Penaltı Kazananı: +1)');
      }
      // Penaltı skorunu tam bildi mi? (+1 Puan)
      if (pPenH === rPenH && pPenA === rPenA) {
        totalPoints += 1;
        breakdown.push('PS (Penaltı Tam Skoru: +1)');
      }
    }
  }

  return { point: totalPoints, label: breakdown.join(' + ') || '0 Puan' };
}

/* =========================================================
   5. OTURUM YÖNETİMİ (AUTH SYSTEMS)
   ========================================================= */
function toggleAuthForm() {
  document.getElementById('login-form').classList.toggle('hidden');
  document.getElementById('register-form').classList.toggle('hidden');
  document.getElementById('auth-error').textContent = '';
}

function registerPlayer() {
  const name = document.getElementById('reg-name').value.trim();
  const pass = document.getElementById('reg-pass').value.trim();
  const errEl = document.getElementById('auth-error');

  if (!name || !pass) {
    errEl.textContent = 'Lütfen kullanıcı adı ve şifre girin.';
    return;
  }

  db.ref('users').once('value').then(snap => {
    const users = snap.val() || {};
    const exists = Object.values(users).some(u => (u.name || '').toLowerCase() === name.toLowerCase());
    
    if (exists) {
      errEl.textContent = 'Bu kullanıcı adı zaten kayıtlı.';
      return;
    }
    
    const uid = generateUID();
    db.ref('users/' + uid).set({ name: name, pass: pass }).then(() => {
      finalizeLogin(uid, name);
    });
  });
}

function playerLogin() {
  const name = document.getElementById('login-name').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const errEl = document.getElementById('auth-error');

  if (!name || !pass) {
    errEl.textContent = 'Lütfen kullanıcı adı ve şifre girin.';
    return;
  }

  db.ref('users').once('value').then(snap => {
    const users = snap.val() || {};
    let foundUid = null, foundUser = null;
    
    for (const [uid, u] of Object.entries(users)) {
      if ((u.name || '').toLowerCase() === name.toLowerCase()) {
        foundUid = uid; 
        foundUser = u; 
        break;
      }
    }
    
    if (!foundUser) {
      errEl.textContent = 'Kullanıcı bulunamadı. Kayıt olmayı deneyin.';
      return;
    }
    
    if (foundUser.pass !== pass) {
      errEl.textContent = 'Şifre hatalı.';
      return;
    }
    
    finalizeLogin(foundUid, foundUser.name);
  });
}

function finalizeLogin(uid, name) {
  CURRENT_UID = uid;
  CURRENT_NAME = name;
  IS_ADMIN = isAdminName(name);

  localStorage.setItem('tahmin_uid', uid);
  localStorage.setItem('tahmin_name', name);

  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('current-user-name').textContent = name;

  if (IS_ADMIN) {
    document.getElementById('admin-tab-btn').classList.remove('hidden');
  } else {
    document.getElementById('admin-tab-btn').classList.add('hidden');
  }

  loadData();
}

function logout() {
  CURRENT_UID = null; CURRENT_NAME = null; IS_ADMIN = false;
  localStorage.removeItem('tahmin_uid');
  localStorage.removeItem('tahmin_name');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-name').value = '';
  document.getElementById('login-pass').value = '';
}

window.addEventListener('load', () => {
  const savedUid = localStorage.getItem('tahmin_uid');
  const savedName = localStorage.getItem('tahmin_name');
  if (savedUid && savedName) {
    db.ref('users/' + savedUid).once('value').then(snap => {
      if (snap.exists()) {
        finalizeLogin(savedUid, snap.val().name);
      } else {
        logout();
      }
    });
  }
});

function switchTab(tabName) {

/* =========================================================

function loadData() {

  db.ref('predictions').on('value', snap => { PREDICTIONS = snap.val() || {}; refreshAll(); });
  db.ref('results').on('value', snap => { RESULTS = snap.val() || {}; refreshAll(); });
}

function refreshAll() {
  calculateLeaderboard();
  renderGroups();
  renderMatches();
  renderResults();
  if (IS_ADMIN) renderAdminPanel();
}

/* =========================================================
   YENİ YARDIMCI FONKSİYON: DİNAMİK TAKIM ADI ÇÖZÜCÜ (FİNALE KADAR)
   ========================================================= */
function resolveDynamicMatch(match) {
  // Maçın orijinal verilerini bozmamak için kopyasını oluşturuyoruz
  const resolved = { ...match };

  // Bir kaynak maç kodundan (örn: "W74", "RU101") kazananı veya kaybedeni bulan iç fonksiyon
  function getDependentTeamName(code) {
    if (!code) return null;
    const isWinner = code.startsWith('W');
    const isRunnerUp = code.startsWith('RU');
    
    if (!isWinner && !isRunnerUp) return null;

    // Kodun içindeki sayısal ID'yi ayıkla (örn: "W74 (GER/PAR)" -> "74" -> "M74")
    const matchNum = code.replace(/[^0-9]/g, '');
    const depMatchId = 'M' + matchNum;

    const result = RESULTS[depMatchId];
    if (!result) return null; // Bağımlı olunan maç henüz oynanmamış

    const depMatch = MATCHES.find(m => m.id === depMatchId);
    if (!depMatch) return null;

    // Önce o kaynak maçın kendi içinde dinamik adları varsa onları çöz (Zincirleme kontrol)
    const resolvedDepMatch = resolveDynamicMatch(depMatch);

    let winnerName = null;
    let loserName = null;

    if (result.penWinner) {
      winnerName = result.penWinner === 'home' ? resolvedDepMatch.h : resolvedDepMatch.a;
      loserName = result.penWinner === 'home' ? resolvedDepMatch.a : resolvedDepMatch.h;
    } else {
      const hs = parseInt(result.hScore);
      const as = parseInt(result.aScore);
      if (hs > as) {
        winnerName = resolvedDepMatch.h;
        loserName = resolvedDepMatch.a;
      } else if (as > hs) {
        winnerName = resolvedDepMatch.a;
        loserName = resolvedDepMatch.h;
      }
    }

    if (isWinner) return winnerName;
    if (isRunnerUp) return loserName;
    return null;
  }

  // Ev sahibi ve Deplasman için kontrolleri gerçekleştir
  const resolvedHome = getDependentTeamName(resolved.h);
  if (resolvedHome) resolved.h = resolvedHome;

  const resolvedAway = getDependentTeamName(resolved.a);
  if (resolvedAway) resolved.a = resolvedAway;

  return resolved;
}

/* =========================================================
   10. AKTİF TAHMİN MAÇLARI (MATCH CARDS) - DİNAMİK GÜNCELLENDİ
   ========================================================= */
function renderMatches() {
  const container = document.getElementById('matches-container');
  if (!container) return;
  container.innerHTML = '';

  const byDate = {};
  MATCHES.forEach(m => {
    if (RESULTS[m.id]) return; 
    
    // Eşleşmeyi dinamik olarak çözümlüyoruz (W74 -> Almanya vb.)
    const resolvedMatch = resolveDynamicMatch(m);
    
    if (!byDate[resolvedMatch.d]) byDate[resolvedMatch.d] = [];
    byDate[resolvedMatch.d].push(resolvedMatch);
  });

  if (Object.keys(byDate).length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center; color:var(--muted); padding: 20px;">Tahmin edilecek aktif maç bulunmuyor.</div>';
    return;
  }

  Object.keys(byDate).sort().forEach(date => {
    const dateBlock = document.createElement('div');
    dateBlock.className = 'match-date-group';
    dateBlock.innerHTML = `<h3>📅 ${formatDate(date)}</h3>`;

    byDate[date].forEach(m => {
      dateBlock.appendChild(buildMatchCard(m));
    });
    container.appendChild(dateBlock);
  });
}   

/* =========================================================
   11. OYNANMIŞ SONUÇLAR SEKMESİ - DİNAMİK GÜNCELLENDİ
   ========================================================= */
function renderResults() {
  const container = document.getElementById('results-container');
  if (!container) return;
  container.innerHTML = '';

  const playedMatches = MATCHES.filter(m => RESULTS[m.id]).sort((a, b) => {
    return new Date(b.d + 'T' + b.t + ':00') - new Date(a.d + 'T' + a.t + ':00');
  });

  if (playedMatches.length === 0) {
    container.innerHTML = '<div class="card" style="text-align:center; color:var(--muted); padding:20px;">Henüz oynanmış maç bulunmuyor.</div>';
    return;
  }

  playedMatches.forEach(m => {
    // Oynanmış maçın takımlarını dinamik çözüyoruz ki sonuçlarda da ülke adları doğru görünsün
    const resolvedMatch = resolveDynamicMatch(m);
    const result = RESULTS[resolvedMatch.id];
    const card = document.createElement('div');
    card.className = 'match-card';

    let resScoreText = `${result.hScore} : ${result.aScore}`;
    if (result.penWinner) {
      const penTeam = result.penWinner === 'home' ? resolvedMatch.h : resolvedMatch.a;
      resScoreText += ` (Uzt/Pen: ${penTeam} ${result.penHScore}:${result.penAScore} kazandı)`;
    }

    let predsHtml = '<div class="others-predictions"><strong>Tahminler ve Puanlar:</strong><br>';
    let any = false;
    
    for (const [uid, user] of Object.entries(USERS)) {
      if (isAdminName(user.name)) continue;
      const p = PREDICTIONS[uid] && PREDICTIONS[uid][resolvedMatch.id];
      if (p) {
        any = true;
        const ev = evaluatePrediction(p, result);
        let mainPts = 0;
        let penPts = 0;

        if (ev && ev.label) {
          if (ev.label.includes('120 Dk Tam Skor')) mainPts = 2;
          else if (ev.label.includes('120 Dk Taraf/Beraberlik')) mainPts = 1;
          if (ev.label.includes('Penaltı Kazananı')) penPts += 1;
          if (ev.label.includes('Penaltı Tam Skoru')) penPts += 1;
        }

        let pText = `${p.hScore}:${p.aScore} <span style="color:#22c55e; font-weight:bold;">(+${mainPts})</span>`;
        if (resolvedMatch.type === 'knockout' && p.penHScore !== undefined && p.penAScore !== undefined && p.penHScore !== '') {
          pText += ` &nbsp;Pen: ${p.penHScore}:${p.penAScore} <span style="color:#22c55e; font-weight:bold;">(+${penPts})</span>`;
        }
        predsHtml += `<span class="pred-item">${user.name}: ${pText}</span>`;
      }
    }
    predsHtml += '</div>';
    if (!any) predsHtml = '<div class="others-predictions" style="color:var(--muted);">Bu maça hiç tahmin yapılmamış.</div>';

    card.innerHTML = `
      <div class="match-top"><span>${resolvedMatch.g}</span><span>${formatDate(resolvedMatch.d)}</span></div>
      <div class="match-teams">
        <span>${flag(resolvedMatch.h)} ${resolvedMatch.h}</span><span class="vs">vs</span><span>${resolvedMatch.a} ${flag(resolvedMatch.a)}</span>
      </div>
      <div class="result-box"><span class="result-score">${resScoreText}</span></div>
      ${predsHtml}
    `;
    container.appendChild(card);
  });
}

/* =========================================================
   12. ADMIN YÖNETİM PANELİ (ADMIN CONTROL PANEL) - DİNAMİK GÜNCELLENDİ
   ========================================================= */
function renderAdminPanel() {
  const matchContainer = document.getElementById('admin-matches-container');
  if (matchContainer) {
    matchContainer.innerHTML = '';
    MATCHES.forEach(m => {
      // Admin panelindeki satırı da dinamik çözüyoruz
      const resolvedMatch = resolveDynamicMatch(m);
      const result = RESULTS[resolvedMatch.id] || {};
      const row = document.createElement('div');
      row.className = 'admin-match-row';
      row.style.borderBottom = "1px solid #eee";
      row.style.padding = "10px 0";

      const rH = result.hScore !== undefined ? result.hScore : '';
      const rA = result.aScore !== undefined ? result.aScore : '';
      
      const rPenH = result.penHScore !== undefined ? result.penHScore : '';
      const rPenA = result.penAScore !== undefined ? result.penAScore : '';
      const checkHome = result.penWinner === 'home' ? 'checked' : '';
      const checkAway = result.penWinner === 'away' ? 'checked' : '';

      let adminKnockoutUi = '';
      if (resolvedMatch.type === 'knockout') {
        adminKnockoutUi = `
          <div style="margin-top: 5px; background: #fffbeb; padding: 6px; border-radius: 4px;">
            <span style="font-size:0.8rem; color:#b45309;">⚠️ Eğer Penaltılara Gittiyse:</span>
            <div style="display:flex; gap:6px; align-items:center; margin-top:3px;">
              <label style="font-size:0.8rem;"><input type="radio" name="adminPenWinner-${resolvedMatch.id}" value="home" ${checkHome}> Ev</label>
              <input type="number" id="admin-pen-h-${resolvedMatch.id}" value="${rPenH}" placeholder="Skor" style="width:40px; font-size:0.8rem;">
              <span>:</span>
              <input type="number" id="admin-pen-a-${resolvedMatch.id}" value="${rPenA}" placeholder="Skor" style="width:40px; font-size:0.8rem;">
              <label style="font-size:0.8rem;"><input type="radio" name="adminPenWinner-${resolvedMatch.id}" value="away" ${checkAway}> Dep</label>
            </div>
          </div>
        `;
      }

      row.innerHTML = `
        <div class="teams" style="font-weight:bold;">${flag(resolvedMatch.h)} ${resolvedMatch.h} vs ${resolvedMatch.a} ${flag(resolvedMatch.a)} <br><small style="color:var(--muted)">${resolvedMatch.g} - ${formatDate(resolvedMatch.d)} (${resolvedMatch.t})</small></div>
        <div class="admin-score-inputs" style="margin-top:5px;">
          <input type="number" min="0" id="admin-h-${resolvedMatch.id}" value="${rH}" placeholder="0" style="width:45px;">
          <span>:</span>
          <input type="number" min="0" id="admin-a-${resolvedMatch.id}" value="${rA}" placeholder="0" style="width:45px;">
          ${adminKnockoutUi}
          <div style="margin-top:5px;">
            <button class="btn-primary btn-small" onclick="adminSaveResult('${resolvedMatch.id}', '${resolvedMatch.type}')">Kaydet</button>
            <button class="btn-danger btn-small" onclick="adminDeleteResult('${resolvedMatch.id}')">Sil</button>
          </div>
        </div>
      `;
      matchContainer.appendChild(row);
    });
  }

  const userContainer = document.getElementById('admin-users-container');
  if (userContainer) {
    userContainer.innerHTML = '';
    const playerUsers = Object.entries(USERS).filter(([uid, u]) => !isAdminName(u.name));
    if (playerUsers.length === 0) {
      userContainer.innerHTML = '<div style="color:var(--muted); padding:8px;">Henüz kayıtlı oyuncu yok.</div>';
      return;
    }
    playerUsers.forEach(([uid, u]) => {
      const row = document.createElement('div');
      row.className = 'admin-user-row';
      const safeName = (u.name || '').replace(/'/g, "\\'");
      row.innerHTML = `
        <span>👤 ${u.name}</span>
        <button class="btn-danger btn-small" onclick="adminDeleteUser('${uid}', '${safeName}')">Sil</button>
      `;
      userContainer.appendChild(row);
    });
  }
}
